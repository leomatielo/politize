<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Provolone Bros</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-wrap">
      <header>
        <h1>🧀 Provolone Bros</h1>
        <p>
          Colete todos os provolones, derrote a fase e não encoste nos inimigos.
          Controles: <strong>A/D</strong> ou <strong>←/→</strong> para mover,
          <strong>W</strong>/<strong>↑</strong>/<strong>Espaço</strong> para pular.
        </p>
      </header>

      <section class="hud" aria-live="polite">
        <span id="score">Provolones: 0</span>
        <span id="lives">Vidas: 3</span>
        <span id="message">Boa sorte!</span>
      </section>

      <canvas id="game" width="960" height="540" role="img" aria-label="Jogo de plataforma 2D"></canvas>
    </main>

    <script src="app.js"></script>
  </body>
</html>
